<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <!-- MindAR Three.js (no A-Frame — direct Three.js control) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* MindAR Three.js injects a container — make it fullscreen */
    #ar-container {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }

    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px;
      z-index: 99999; pointer-events: none;
    }

    #tap-start {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99998; color: #fff;
      font-family: -apple-system, sans-serif; cursor: pointer;
    }
    #tap-start .big { font-size: 52px; margin-bottom: 16px; }
    #tap-start h2   { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #tap-start p    { font-size: 14px; opacity: 0.6; }

    #loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif; transition: opacity 0.6s;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff7755; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-hint {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff;
      padding: 12px 24px; border-radius: 99px;
      font-family: -apple-system, sans-serif; font-size: 15px;
      pointer-events: none; z-index: 9998; display: none;
    }

    #toggle-btn {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,119,85,0.92); color: #fff; border: none;
      border-radius: 99px; padding: 14px 40px;
      font-size: 16px; font-weight: 700;
      font-family: -apple-system, sans-serif;
      cursor: pointer; z-index: 9998; display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
    }
  </style>
</head>
<body>

  <div id="version-badge">v1.0</div>

  <!-- MindAR Three.js needs a container div -->
  <div id="ar-container"></div>

  <div id="tap-start">
    <div class="big">👆</div>
    <h2>Tap to Start AR</h2>
    <p>Aim camera at the mural artwork</p>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Starting AR...</p>
  </div>

  <div id="scan-hint">📷 Aim at the mural artwork</div>
  <button id="toggle-btn">Toggle Video</button>

  <!-- Videos outside everything — plain HTML, unlocked by user tap -->
  <video id="vid1" src="assets/Jepah_1.mp4"
    muted playsinline loop crossorigin="anonymous"
    style="display:none; position:absolute; width:1px; height:1px;"></video>
  <video id="vid2" src="assets/Jepah_2.mp4"
    muted playsinline loop crossorigin="anonymous"
    style="display:none; position:absolute; width:1px; height:1px;"></video>

  <script>
    var tapScreen  = document.getElementById('tap-start');
    var loadingEl  = document.getElementById('loading-overlay');
    var scanHint   = document.getElementById('scan-hint');
    var toggleBtn  = document.getElementById('toggle-btn');
    var vid1El     = document.getElementById('vid1');
    var vid2El     = document.getElementById('vid2');
    var showingVid1 = true;

    tapScreen.addEventListener('click', function () {
      tapScreen.style.display = 'none';
      loadingEl.style.display = 'flex';

      // Unlock video on user gesture — critical for iOS/Android
      vid1El.play().then(function () {
        // videos unlocked, now start AR
        startAR();
      }).catch(function () {
        startAR();
      });
      vid2El.play().catch(function(){});
    });

    function startAR() {
      // ── MindARThree setup ───────────────────────────────────────────────
      const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container:        document.getElementById('ar-container'),
        imageTargetSrc:   'assets/targets.mind',
        maxTrack:         1,
        uiLoading:        'no',
        uiError:          'no',
        uiScanning:       'no',
      });

      const { renderer, scene, camera } = mindarThree;

      // ── Video textures (Method B proved this works on this device) ──────
      const tex1 = new THREE.VideoTexture(vid1El);
      tex1.minFilter = THREE.LinearFilter;
      tex1.magFilter = THREE.LinearFilter;

      const tex2 = new THREE.VideoTexture(vid2El);
      tex2.minFilter = THREE.LinearFilter;
      tex2.magFilter = THREE.LinearFilter;

      // ── Plane geometry — matches original project: 1.2 x 1.2 units ─────
      const geo = new THREE.PlaneGeometry(1.2, 1.2);

      const mat1 = new THREE.MeshBasicMaterial({
        map: tex1,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const mat2 = new THREE.MeshBasicMaterial({
        map: tex2,
        side: THREE.DoubleSide,
        depthWrite: false,
      });

      const plane1 = new THREE.Mesh(geo, mat1);
      const plane2 = new THREE.Mesh(geo, mat2);

      // Center on marker — original used position 0.05, -0.03, 0 and scale 0.82
      // Start at 0,0,0 for testing first
      plane1.position.set(0, 0, 0);
      plane2.position.set(0, 0, 0);
      plane2.visible = false;

      // ── Anchor — attaches planes to marker index 0 ──────────────────────
      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(plane1);
      anchor.group.add(plane2);

      anchor.onTargetFound = function () {
        scanHint.style.display = 'none';
        toggleBtn.style.display = 'block';
        vid1El.play().catch(function(){});
        vid2El.play().catch(function(){});
      };

      anchor.onTargetLost = function () {
        scanHint.style.display = 'block';
        toggleBtn.style.display = 'none';
      };

      // ── Toggle ───────────────────────────────────────────────────────────
      toggleBtn.addEventListener('click', function () {
        showingVid1 = !showingVid1;
        plane1.visible =  showingVid1;
        plane2.visible = !showingVid1;
      });

      // ── Start AR + render loop ───────────────────────────────────────────
      mindarThree.start().then(function () {
        loadingEl.style.opacity = '0';
        setTimeout(function () { loadingEl.style.display = 'none'; }, 700);
        scanHint.style.display = 'block';

        renderer.setAnimationLoop(function () {
          renderer.render(scene, camera);
        });
      }).catch(function (err) {
        console.error('MindAR start error:', err);
        loadingEl.style.display = 'none';
        scanHint.style.display = 'block';
      });
    }
  </script>

</body>
</html>
