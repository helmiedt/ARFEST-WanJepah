<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    a-scene {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      z-index: 0 !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important;
      background: transparent !important;
    }

    /* Version badge - always visible top-left */
    #version-badge {
      position: fixed;
      top: 12px; left: 12px;
      background: rgba(255, 119, 85, 0.85);
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 6px;
      z-index: 99999;
      pointer-events: none;
      letter-spacing: 0.5px;
    }

    #loading-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif;
      transition: opacity 0.6s;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff7755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-hint {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff; padding: 12px 24px;
      border-radius: 99px;
      font-family: -apple-system, sans-serif;
      font-size: 15px; pointer-events: none;
      z-index: 9998; display: none;
      white-space: nowrap;
    }

    #toggle-btn {
      position: fixed;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 119, 85, 0.92);
      color: #fff; border: none;
      border-radius: 99px;
      padding: 14px 40px;
      font-size: 16px; font-weight: 700;
      font-family: -apple-system, sans-serif;
      cursor: pointer; z-index: 9998;
      display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
    }
    #toggle-btn:active { opacity: 0.85; }
  </style>
</head>
<body>

  <!-- Version badge: bump this number every update -->
  <div id="version-badge">v0.4</div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Starting AR...</p>
  </div>

  <div id="scan-hint">📷 Point at the target image</div>
  <button id="toggle-btn">Toggle Video</button>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video id="vid1" autoplay muted playsinline loop crossorigin="anonymous"
        src="assets/Jepah_1.mp4" preload="auto"></video>
      <video id="vid2" autoplay muted playsinline loop crossorigin="anonymous"
        src="assets/Jepah_2.mp4" preload="auto"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Video 1 — plain video, no chromakey, position 0 0 0 for testing -->
      <a-video
        id="vid1-entity"
        src="#vid1"
        width="1" height="1"
        position="0 0 0"
        visible="true"
      ></a-video>

      <!-- Video 2 -->
      <a-video
        id="vid2-entity"
        src="#vid2"
        width="1" height="1"
        position="0 0 0"
        visible="false"
      ></a-video>

    </a-entity>

    <a-light type="ambient"     color="#fff" intensity="0.7"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
  </a-scene>

  <script>
    var overlay   = document.getElementById('loading-overlay');
    var scanHint  = document.getElementById('scan-hint');
    var toggleBtn = document.getElementById('toggle-btn');
    var scene     = document.querySelector('a-scene');

    function hideOverlay() {
      overlay.style.opacity = '0';
      setTimeout(function() { overlay.style.display = 'none'; }, 700);
      scanHint.style.display = 'block';
      // Keep the AR camera feed video visible, not the asset videos
      document.querySelectorAll('video').forEach(function(v) {
        if (!v.id) {
          v.style.visibility = 'visible';
          v.style.opacity = '1';
          v.style.zIndex = '0';
        }
      });
    }

    scene.addEventListener('loaded', function () {
      var sys = scene.systems['mindar-image-system'];
      if (sys) { sys.el.addEventListener('arReady', hideOverlay); }
      setTimeout(hideOverlay, 8000);
    });

    var targetEl = document.querySelector('[mindar-image-target]');

    targetEl.addEventListener('targetFound', function() {
      scanHint.style.display = 'none';
      toggleBtn.style.display = 'block';
      document.getElementById('vid1').play().catch(function(){});
      document.getElementById('vid2').play().catch(function(){});
    });

    targetEl.addEventListener('targetLost', function() {
      scanHint.style.display = 'block';
      toggleBtn.style.display = 'none';
    });

    var showingVid1 = true;
    toggleBtn.addEventListener('click', function() {
      showingVid1 = !showingVid1;
      document.getElementById('vid1-entity').setAttribute('visible', showingVid1);
      document.getElementById('vid2-entity').setAttribute('visible', !showingVid1);
    });
  </script>

</body>
</html>
