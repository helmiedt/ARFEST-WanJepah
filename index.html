<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <!-- MindAR Three.js version (no A-Frame at all) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px;
      z-index: 99999; pointer-events: none;
    }
    #loading-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif; transition: opacity 0.6s;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff7755; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-hint {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff;
      padding: 12px 24px; border-radius: 99px;
      font-family: -apple-system, sans-serif; font-size: 15px;
      pointer-events: none; z-index: 9998; display: none; white-space: nowrap;
    }
    #toggle-btn {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,119,85,0.92); color: #fff; border: none;
      border-radius: 99px; padding: 14px 40px;
      font-size: 16px; font-weight: 700;
      font-family: -apple-system, sans-serif;
      cursor: pointer; z-index: 9998; display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
    }
  </style>
</head>
<body>

  <div id="version-badge">v0.6</div>
  <div id="loading-overlay"><div class="spinner"></div><p>Starting AR...</p></div>
  <div id="scan-hint">📷 Point at the target image</div>
  <button id="toggle-btn">Toggle Video</button>

  <!-- Hidden video elements — autoplay muted required for mobile -->
  <video id="vid1" src="assets/Jepah_1.mp4"
    autoplay muted playsinline loop crossorigin="anonymous"
    style="display:none"></video>
  <video id="vid2" src="assets/Jepah_2.mp4"
    autoplay muted playsinline loop crossorigin="anonymous"
    style="display:none"></video>

  <script>
    const overlay   = document.getElementById('loading-overlay');
    const scanHint  = document.getElementById('scan-hint');
    const toggleBtn = document.getElementById('toggle-btn');
    const vid1El    = document.getElementById('vid1');
    const vid2El    = document.getElementById('vid2');

    function hideOverlay() {
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 700);
      scanHint.style.display = 'block';
    }

    const start = async () => {
      // ── Init MindARThree ──────────────────────────────────────────────────
      const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container: document.body,
        imageTargetSrc: 'assets/targets.mind',
        maxTrack: 1,
        uiLoading: 'no',
        uiError: 'no',
        uiScanning: 'no',
      });

      const { renderer, scene, camera } = mindarThree;

      // ── Video textures ────────────────────────────────────────────────────
      const tex1 = new THREE.VideoTexture(vid1El);
      tex1.minFilter = THREE.LinearFilter;
      tex1.magFilter = THREE.LinearFilter;
      tex1.format    = THREE.RGBAFormat;

      const tex2 = new THREE.VideoTexture(vid2El);
      tex2.minFilter = THREE.LinearFilter;
      tex2.magFilter = THREE.LinearFilter;
      tex2.format    = THREE.RGBAFormat;

      // ── Plane meshes ──────────────────────────────────────────────────────
      const geo  = new THREE.PlaneGeometry(1, 1);

      const mat1 = new THREE.MeshBasicMaterial({ map: tex1, side: THREE.DoubleSide });
      const mat2 = new THREE.MeshBasicMaterial({ map: tex2, side: THREE.DoubleSide });

      const plane1 = new THREE.Mesh(geo, mat1);
      const plane2 = new THREE.Mesh(geo, mat2);
      plane1.position.set(0, 0, 0);
      plane2.position.set(0, 0, 0);
      plane2.visible = false;

      // ── Anchor (image target 0) ───────────────────────────────────────────
      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(plane1);
      anchor.group.add(plane2);

      anchor.onTargetFound = () => {
        scanHint.style.display = 'none';
        toggleBtn.style.display = 'block';
        vid1El.play().catch(() => {});
        vid2El.play().catch(() => {});
      };

      anchor.onTargetLost = () => {
        scanHint.style.display = 'block';
        toggleBtn.style.display = 'none';
      };

      // ── Toggle button ─────────────────────────────────────────────────────
      let showingVid1 = true;
      toggleBtn.addEventListener('click', () => {
        showingVid1 = !showingVid1;
        plane1.visible =  showingVid1;
        plane2.visible = !showingVid1;
      });

      // ── Start AR ──────────────────────────────────────────────────────────
      await mindarThree.start();
      hideOverlay();

      // ── Render loop ───────────────────────────────────────────────────────
      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    };

    start().catch(err => {
      console.error('AR start error:', err);
      hideOverlay();
    });
  </script>

</body>
</html>
