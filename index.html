<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    a-scene {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    /* Only apply the global video fix to the AR camera feed (no id) */
    video:not([id]) {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important; z-index: 0 !important;
      display: block !important; visibility: visible !important; opacity: 1 !important;
    }
    canvas {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important; background: transparent !important;
    }

    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px;
      z-index: 99999; pointer-events: none;
    }

    #tap-start {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99998; color: #fff;
      font-family: -apple-system, sans-serif; cursor: pointer;
    }
    #tap-start .big { font-size: 52px; margin-bottom: 16px; }
    #tap-start h2   { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #tap-start p    { font-size: 14px; opacity: 0.6; }

    #loading-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif; transition: opacity 0.6s;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff7755; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-hint {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff;
      padding: 12px 24px; border-radius: 99px;
      font-family: -apple-system, sans-serif; font-size: 15px;
      pointer-events: none; z-index: 9998; display: none; white-space: nowrap;
    }
    #toggle-btn {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,119,85,0.92); color: #fff; border: none;
      border-radius: 99px; padding: 14px 40px;
      font-size: 16px; font-weight: 700;
      font-family: -apple-system, sans-serif;
      cursor: pointer; z-index: 9998; display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
    }

    /* ── HTML overlay video on marker ── */
    /* Sits above canvas (z-index 2), tracks marker position via JS transform */
    .marker-video {
      position: fixed;
      /* start centered, JS will update transform-origin + transform */
      top: 50%; left: 50%;
      width: 260px; height: 260px;
      margin-left: -130px; margin-top: -130px;
      z-index: 2;
      display: none;
      pointer-events: none;
      border-radius: 4px;
      object-fit: cover;
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div id="version-badge">v0.9</div>

  <div id="tap-start">
    <div class="big">👆</div>
    <h2>Tap to Start AR</h2>
    <p>Camera + video will start</p>
  </div>

  <div id="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <p>Starting AR...</p>
  </div>

  <div id="scan-hint">📷 Point at the target image</div>
  <button id="toggle-btn">Toggle Video</button>

  <!--
    THE KEY INSIGHT:
    A-Frame video planes don't work reliably on mobile.
    Instead: raw HTML <video> elements are positioned over the marker
    using CSS + the marker's projected screen position from Three.js.
    This is the same technique as Method B but tracked to the marker.
  -->
  <video id="vid1" class="marker-video"
    src="assets/Jepah_1.mp4"
    muted playsinline loop crossorigin="anonymous"></video>

  <video id="vid2" class="marker-video"
    src="assets/Jepah_2.mp4"
    muted playsinline loop crossorigin="anonymous"></video>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <!-- Invisible anchor — only used to get marker world position -->
    <a-camera id="main-cam" position="0 0 0"
      look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <a-entity id="marker-anchor" mindar-image-target="targetIndex: 0">
      <!-- Invisible reference point at center of marker -->
      <a-entity id="marker-center" position="0 0 0"></a-entity>
    </a-entity>

    <a-light type="ambient" color="#fff" intensity="1"></a-light>
  </a-scene>

  <script>
    var tapScreen   = document.getElementById('tap-start');
    var loadingEl   = document.getElementById('loading-overlay');
    var scanHint    = document.getElementById('scan-hint');
    var toggleBtn   = document.getElementById('toggle-btn');
    var scene       = document.querySelector('a-scene');
    var vid1El      = document.getElementById('vid1');
    var vid2El      = document.getElementById('vid2');
    var markerAnchor = document.getElementById('marker-anchor');
    var markerCenter = document.getElementById('marker-center');

    var markerFound  = false;
    var showingVid1  = true;

    // ── Tap to start ──────────────────────────────────────────────────────
    tapScreen.addEventListener('click', function () {
      tapScreen.style.display = 'none';
      loadingEl.style.display = 'flex';

      vid1El.play().catch(function(){});
      vid2El.play().catch(function(){});

      if (scene.hasLoaded) {
        startAR();
      } else {
        scene.addEventListener('loaded', startAR, { once: true });
      }
    });

    function startAR() {
      var sys = scene.systems['mindar-image-system'];
      if (sys) { sys.start(); }
    }

    // ── AR ready ──────────────────────────────────────────────────────────
    function hideLoading() {
      loadingEl.style.opacity = '0';
      setTimeout(function () { loadingEl.style.display = 'none'; }, 700);
      scanHint.style.display = 'block';
    }
    scene.addEventListener('loaded', function () {
      var sys = scene.systems['mindar-image-system'];
      if (sys) { sys.el.addEventListener('arReady', hideLoading); }
      setTimeout(hideLoading, 10000);
    });

    // ── Target found / lost ───────────────────────────────────────────────
    scene.addEventListener('loaded', function () {
      markerAnchor.addEventListener('targetFound', function () {
        markerFound = true;
        scanHint.style.display = 'none';
        toggleBtn.style.display = 'block';
        // Show the active video overlay
        var activeVid = showingVid1 ? vid1El : vid2El;
        activeVid.style.display = 'block';
        activeVid.play().catch(function(){});
      });

      markerAnchor.addEventListener('targetLost', function () {
        markerFound = false;
        scanHint.style.display = 'block';
        toggleBtn.style.display = 'none';
        vid1El.style.display = 'none';
        vid2El.style.display = 'none';
      });
    });

    // ── Toggle ────────────────────────────────────────────────────────────
    toggleBtn.addEventListener('click', function () {
      showingVid1 = !showingVid1;
      if (showingVid1) {
        vid1El.style.display = 'block';
        vid2El.style.display = 'none';
        vid1El.play().catch(function(){});
      } else {
        vid1El.style.display = 'none';
        vid2El.style.display = 'block';
        vid2El.play().catch(function(){});
      }
    });

    // ── Track marker position every frame ────────────────────────────────
    // Projects the marker's 3D world position to 2D screen coordinates
    // then positions the HTML video element there via CSS transform
    var _vec3   = new THREE.Vector3();
    var _canvas, _cam3D;

    function trackMarker() {
      requestAnimationFrame(trackMarker);
      if (!markerFound) return;

      // Get Three.js camera and renderer on first valid frame
      if (!_cam3D) {
        var camEl = document.getElementById('main-cam');
        if (!camEl || !camEl.object3D) return;
        _cam3D = camEl.getObject3D('camera') || camEl.object3D.children[0];
        if (!_cam3D) return;
      }
      if (!_canvas) {
        _canvas = document.querySelector('canvas');
        if (!_canvas) return;
      }

      // Get the marker center world position
      var centerEl = document.getElementById('marker-center');
      if (!centerEl || !centerEl.object3D) return;

      centerEl.object3D.getWorldPosition(_vec3);

      // Project to normalized device coordinates
      _vec3.project(_cam3D);

      // Convert NDC to screen pixels
      var W = window.innerWidth;
      var H = window.innerHeight;
      var screenX = (_vec3.x *  0.5 + 0.5) * W;
      var screenY = (_vec3.y * -0.5 + 0.5) * H;

      // Marker scale: estimate based on distance (z after project = depth)
      // closer = bigger. Tune the 260 base size here.
      var depth = markerAnchor.object3D
        ? markerAnchor.object3D.position.length()
        : 1;
      var size = Math.max(80, Math.min(600, 260));

      var tx = screenX - size / 2;
      var ty = screenY - size / 2;

      var styleStr = 'display:block; left:0; top:0; margin:0; width:' + size + 'px; height:' + size + 'px; transform: translate(' + tx + 'px,' + ty + 'px);';

      if (showingVid1 && vid1El.style.display !== 'none') {
        vid1El.style.cssText = vid1El.style.cssText; // keep display
        vid1El.style.left    = '0';
        vid1El.style.top     = '0';
        vid1El.style.margin  = '0';
        vid1El.style.width   = size + 'px';
        vid1El.style.height  = size + 'px';
        vid1El.style.transform = 'translate(' + tx + 'px,' + ty + 'px)';
      } else if (!showingVid1 && vid2El.style.display !== 'none') {
        vid2El.style.left    = '0';
        vid2El.style.top     = '0';
        vid2El.style.margin  = '0';
        vid2El.style.width   = size + 'px';
        vid2El.style.height  = size + 'px';
        vid2El.style.transform = 'translate(' + tx + 'px,' + ty + 'px)';
      }
    }

    // Start tracking loop after scene loads
    scene.addEventListener('loaded', function () {
      trackMarker();
    });
  </script>

</body>
</html>
