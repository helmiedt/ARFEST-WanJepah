<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    a-scene {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video:not([id]) {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important; z-index: 0 !important;
      display: block !important; visibility: visible !important; opacity: 1 !important;
    }
    canvas {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important; background: transparent !important;
    }
    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px; z-index: 99999; pointer-events: none;
    }
    #dbg {
      position: fixed; top: 44px; left: 12px;
      background: rgba(0,0,0,0.75); color: #0f0;
      font-family: monospace; font-size: 11px;
      padding: 6px 8px; border-radius: 6px;
      z-index: 99999; pointer-events: none;
      max-width: 240px; line-height: 1.6;
    }
    #tap-start {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99998; color: #fff;
      font-family: -apple-system, sans-serif; cursor: pointer;
    }
    #tap-start .big { font-size: 52px; margin-bottom: 16px; }
    #tap-start h2   { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #tap-start p    { font-size: 14px; opacity: 0.6; }
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff; font-family: -apple-system, sans-serif;
    }
    .spinner { width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15); border-top-color: #ff7755;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 18px; }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #scan-hint {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff; padding: 12px 24px;
      border-radius: 99px; font-family: -apple-system, sans-serif;
      font-size: 15px; pointer-events: none; z-index: 9998; display: none;
    }
    #toggle-btn {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: rgba(255,119,85,0.92); color: #fff; border: none;
      border-radius: 99px; padding: 14px 40px; font-size: 16px; font-weight: 700;
      font-family: -apple-system, sans-serif; cursor: pointer; z-index: 9998; display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
    }
  </style>
</head>
<body>

  <div id="version-badge">v1.3</div>
  <div id="dbg">waiting...</div>

  <div id="tap-start">
    <div class="big">👆</div>
    <h2>Tap to Start AR</h2>
    <p>Aim at the mural artwork</p>
  </div>
  <div id="loading-overlay"><div class="spinner"></div><p>Starting AR...</p></div>
  <div id="scan-hint">📷 Aim at the mural artwork</div>
  <button id="toggle-btn">Toggle Video</button>

  <!-- Videos: hidden but src loaded -->
  <video id="vid1" src="assets/Jepah_1.mp4" muted playsinline loop crossorigin="anonymous"
    style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"></video>
  <video id="vid2" src="assets/Jepah_2.mp4" muted playsinline loop crossorigin="anonymous"
    style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- No geometry component — we build the mesh 100% manually in JS -->
      <a-entity id="vid-plane"></a-entity>
    </a-entity>

    <a-light type="ambient" color="#fff" intensity="1"></a-light>
  </a-scene>

  <script>
    var dbg = document.getElementById('dbg');
    var logLines = [];
    function log(msg) {
      logLines.unshift(msg);
      if (logLines.length > 7) logLines.pop();
      dbg.innerHTML = logLines.join('<br>');
    }

    var vid1El = document.getElementById('vid1');
    var vid2El = document.getElementById('vid2');
    var scene  = document.querySelector('a-scene');
    var showingVid1 = true;

    // Canvas + texture (built once, reused)
    var cvs = document.createElement('canvas');
    cvs.width = 512; cvs.height = 512;
    var ctx = cvs.getContext('2d');
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(0, 0, 512, 512); // red = canvas alive

    var tex = new THREE.CanvasTexture(cvs);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;

    var mat = new THREE.MeshBasicMaterial({
      map: tex,
      side: THREE.DoubleSide,
      depthWrite: false,
      transparent: false,
    });

    var geo  = new THREE.PlaneGeometry(1, 1);
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(0, 0, 0);
    mesh.visible = false; // hidden until target found

    // Draw loop — copies video frame to canvas every animation frame
    var drawActive = false;
    function drawLoop() {
      if (!drawActive) { requestAnimationFrame(drawLoop); return; }
      var vid = showingVid1 ? vid1El : vid2El;
      if (vid.readyState >= 2) {
        ctx.drawImage(vid, 0, 0, 512, 512);
      } else {
        ctx.fillStyle = '#000055';
        ctx.fillRect(0, 0, 512, 512);
        ctx.fillStyle = '#fff';
        ctx.font = '24px monospace';
        ctx.fillText('rs:' + vid.readyState, 20, 256);
      }
      tex.needsUpdate = true;
      requestAnimationFrame(drawLoop);
    }
    requestAnimationFrame(drawLoop);

    // Inject mesh into target entity once scene loads
    scene.addEventListener('loaded', function () {
      log('scene loaded');

      // Get the vid-plane entity's object3D and add our mesh directly
      var planeEl = document.getElementById('vid-plane');
      planeEl.object3D.add(mesh);
      log('mesh injected into object3D');

      // Start MindAR if already tapped
      if (window.arShouldStart) {
        var sys = scene.systems['mindar-image-system'];
        if (sys) sys.start();
      }

      var sys = scene.systems['mindar-image-system'];
      if (sys) {
        sys.el.addEventListener('arReady', function () {
          log('arReady');
          document.getElementById('loading-overlay').style.display = 'none';
          document.getElementById('scan-hint').style.display = 'block';
        });
      }
      setTimeout(function () {
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('scan-hint').style.display = 'block';
      }, 12000);

      var target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', function () {
        log('TARGET FOUND - showing mesh');
        mesh.visible = true;
        drawActive = true;
        document.getElementById('scan-hint').style.display = 'none';
        document.getElementById('toggle-btn').style.display = 'block';
        (showingVid1 ? vid1El : vid2El).play().catch(function(){});
      });
      target.addEventListener('targetLost', function () {
        log('target lost');
        mesh.visible = false;
        document.getElementById('scan-hint').style.display = 'block';
        document.getElementById('toggle-btn').style.display = 'none';
      });
    });

    // Tap to start
    document.getElementById('tap-start').addEventListener('click', function () {
      document.getElementById('tap-start').style.display = 'none';
      document.getElementById('loading-overlay').style.display = 'flex';
      log('tap - unlocking video');

      vid1El.play().then(function () { log('vid1 ok rs:' + vid1El.readyState); })
                   .catch(function (e) { log('vid1 err:' + e.message); });
      vid2El.play().catch(function(){});

      window.arShouldStart = true;
      if (scene.hasLoaded) {
        var sys = scene.systems['mindar-image-system'];
        if (sys) { sys.start(); log('mindar started'); }
        else { log('no sys yet'); }
      }
    });

    // Toggle
    document.getElementById('toggle-btn').addEventListener('click', function () {
      showingVid1 = !showingVid1;
      var vid = showingVid1 ? vid1El : vid2El;
      vid.play().catch(function(){});
      log('toggle -> vid' + (showingVid1 ? 1 : 2));
    });
  </script>

</body>
</html>
