<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <!-- A-Frame first, then MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Chromakey (green screen) shader for videos -->
  <script src="https://unpkg.com/aframe-chromakey-material@1.1.4/dist/aframe-chromakey-material.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* Force fullscreen AR view */
    a-scene {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      z-index: 0 !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important;
      background: transparent !important;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif;
      transition: opacity 0.6s;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff7755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scan hint */
    #scan-hint {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff; padding: 12px 24px;
      border-radius: 99px;
      font-family: -apple-system, sans-serif;
      font-size: 15px; pointer-events: none;
      z-index: 9998; display: none;
      white-space: nowrap;
    }

    /* Toggle button */
    #toggle-btn {
      position: fixed;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 119, 85, 0.9);
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 14px 36px;
      font-size: 16px;
      font-weight: 700;
      font-family: -apple-system, sans-serif;
      cursor: pointer;
      z-index: 9998;
      display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
      letter-spacing: 0.5px;
    }
    #toggle-btn:active { transform: translateX(-50%) scale(0.96); }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Starting AR...</p>
  </div>

  <div id="scan-hint">📷 Point at the target image</div>

  <button id="toggle-btn">Toggle Video</button>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets>
      <video id="Jepah1-video" autoplay muted playsinline crossorigin="anonymous"
        loop src="assets/Jepah_1.mp4" preload="auto"></video>
      <video id="Jepah2-video" autoplay muted playsinline crossorigin="anonymous"
        loop src="assets/Jepah_2.mp4" preload="auto" style="display:none"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <!-- Image Target 0 = first image (model-target / my-target combined into one .mind) -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Video 1 plane - chromakey green screen removed -->
      <a-entity
        id="vid1-entity"
        geometry="primitive: plane; height: 1.2; width: 1.2;"
        material="shader: chromakey; src: #Jepah1-video; color: 0 1 0; transparent: true"
        position="0.05 -0.03 0"
        scale="0.82 0.82 0.82"
        visible="true"
      ></a-entity>

      <!-- Video 2 plane -->
      <a-entity
        id="vid2-entity"
        geometry="primitive: plane; height: 1.2; width: 1.2;"
        material="shader: chromakey; src: #Jepah2-video; color: 0 1 0; transparent: true"
        position="0.05 -0.03 0"
        scale="0.82 0.82 0.82"
        visible="false"
      ></a-entity>

    </a-entity>

    <a-light type="ambient"     color="#fff" intensity="0.7"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

  </a-scene>

  <script>
    var overlay    = document.getElementById('loading-overlay');
    var scanHint   = document.getElementById('scan-hint');
    var toggleBtn  = document.getElementById('toggle-btn');
    var scene      = document.querySelector('a-scene');

    // --- Loading ---
    function hideOverlay() {
      overlay.style.opacity = '0';
      setTimeout(function() { overlay.style.display = 'none'; }, 700);
      scanHint.style.display = 'block';
      // Force video elements visible
      document.querySelectorAll('video').forEach(function(v) {
        v.style.visibility = 'visible';
        v.style.opacity = '1';
        v.style.zIndex = '0';
      });
    }

    scene.addEventListener('loaded', function () {
      var sys = scene.systems['mindar-image-system'];
      if (sys) {
        sys.el.addEventListener('arReady', hideOverlay);
      }
      setTimeout(hideOverlay, 8000);
    });

    // --- Show toggle button when target found ---
    var target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', function() {
      scanHint.style.display = 'none';
      toggleBtn.style.display = 'block';
      // Play both videos
      document.getElementById('Jepah1-video').play();
      document.getElementById('Jepah2-video').play();
    });
    target.addEventListener('targetLost', function() {
      scanHint.style.display = 'block';
      toggleBtn.style.display = 'none';
    });

    // --- Toggle between vid1 and vid2 ---
    var showingVid1 = true;
    toggleBtn.addEventListener('click', function() {
      var vid1 = document.getElementById('vid1-entity');
      var vid2 = document.getElementById('vid2-entity');
      showingVid1 = !showingVid1;
      vid1.setAttribute('visible', showingVid1);
      vid2.setAttribute('visible', !showingVid1);
      toggleBtn.textContent = showingVid1 ? 'Toggle Video' : 'Toggle Video';
    });
  </script>

</body>
</html>
