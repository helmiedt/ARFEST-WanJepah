<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <!-- A-Frame 1.6.0 (official MindAR recommended version) -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    a-scene {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important; z-index: 0 !important;
      display: block !important; visibility: visible !important; opacity: 1 !important;
    }
    canvas {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important; background: transparent !important;
    }

    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px;
      z-index: 99999; pointer-events: none;
    }

    /* Tap-to-start screen — unlocks video autoplay on mobile */
    #tap-start {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99998; color: #fff;
      font-family: -apple-system, sans-serif;
      cursor: pointer;
    }
    #tap-start .big { font-size: 52px; margin-bottom: 16px; }
    #tap-start h2  { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #tap-start p   { font-size: 14px; opacity: 0.6; }

    #loading-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif; transition: opacity 0.6s;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff7755; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-hint {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff;
      padding: 12px 24px; border-radius: 99px;
      font-family: -apple-system, sans-serif; font-size: 15px;
      pointer-events: none; z-index: 9998; display: none; white-space: nowrap;
    }
    #toggle-btn {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,119,85,0.92); color: #fff; border: none;
      border-radius: 99px; padding: 14px 40px;
      font-size: 16px; font-weight: 700;
      font-family: -apple-system, sans-serif;
      cursor: pointer; z-index: 9998; display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
    }
  </style>
</head>
<body>

  <div id="version-badge">v0.7</div>

  <!-- Tap to start — critical for mobile video autoplay unlock -->
  <div id="tap-start">
    <div class="big">👆</div>
    <h2>Tap to Start AR</h2>
    <p>Camera + video will start</p>
  </div>

  <div id="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <p>Starting AR...</p>
  </div>

  <div id="scan-hint">📷 Point at the target image</div>
  <button id="toggle-btn">Toggle Video</button>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video id="vid1" src="assets/Jepah_1.mp4"
        preload="auto" muted playsinline loop crossorigin="anonymous"></video>
      <video id="vid2" src="assets/Jepah_2.mp4"
        preload="auto" muted playsinline loop crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Plain flat plane with video src — position 0 0 0 for testing -->
      <a-plane
        id="vid1-plane"
        src="#vid1"
        width="1" height="1"
        position="0 0 0"
        rotation="0 0 0"
        material="shader: flat; src: #vid1; side: double;"
        visible="true"
      ></a-plane>

      <a-plane
        id="vid2-plane"
        src="#vid2"
        width="1" height="1"
        position="0 0 0"
        rotation="0 0 0"
        material="shader: flat; src: #vid2; side: double;"
        visible="false"
      ></a-plane>
    </a-entity>

    <a-light type="ambient" color="#fff" intensity="1"></a-light>
  </a-scene>

  <script>
    var tapScreen   = document.getElementById('tap-start');
    var loadingEl   = document.getElementById('loading-overlay');
    var scanHint    = document.getElementById('scan-hint');
    var toggleBtn   = document.getElementById('toggle-btn');
    var scene       = document.querySelector('a-scene');
    var vid1El      = document.getElementById('vid1');
    var vid2El      = document.getElementById('vid2');

    // ── Step 1: user taps screen → unlocks video, starts AR ──────────────
    tapScreen.addEventListener('click', function () {
      tapScreen.style.display = 'none';
      loadingEl.style.display = 'flex';

      // Play videos immediately on user gesture — this unlocks autoplay
      vid1El.play().catch(function(){});
      vid2El.play().catch(function(){});

      // Now start MindAR
      scene.setAttribute('mindar-image', 'autoStart: true; imageTargetSrc: assets/targets.mind; uiLoading: no; uiError: no; uiScanning: no;');

      var sys = scene.systems['mindar-image-system'];
      if (sys) {
        sys.start();
      }
    });

    // ── Step 2: AR ready → hide loading, show scan hint ──────────────────
    function hideLoading() {
      loadingEl.style.opacity = '0';
      setTimeout(function () { loadingEl.style.display = 'none'; }, 700);
      scanHint.style.display = 'block';
    }

    scene.addEventListener('loaded', function () {
      var sys = scene.systems['mindar-image-system'];
      if (sys) { sys.el.addEventListener('arReady', hideLoading); }
      setTimeout(hideLoading, 10000);
    });

    // ── Step 3: target found/lost ─────────────────────────────────────────
    scene.addEventListener('loaded', function () {
      var target = document.querySelector('[mindar-image-target]');
      if (!target) return;

      target.addEventListener('targetFound', function () {
        scanHint.style.display = 'none';
        toggleBtn.style.display = 'block';
        vid1El.play().catch(function(){});
        vid2El.play().catch(function(){});
      });

      target.addEventListener('targetLost', function () {
        scanHint.style.display = 'block';
        toggleBtn.style.display = 'none';
      });
    });

    // ── Toggle button ─────────────────────────────────────────────────────
    var showingVid1 = true;
    toggleBtn.addEventListener('click', function () {
      showingVid1 = !showingVid1;
      document.getElementById('vid1-plane').setAttribute('visible', showingVid1);
      document.getElementById('vid2-plane').setAttribute('visible', !showingVid1);
    });
  </script>

</body>
</html>
