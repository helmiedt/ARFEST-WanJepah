<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    a-scene {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video:not([id]) {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important; z-index: 0 !important;
      display: block !important; visibility: visible !important; opacity: 1 !important;
    }
    canvas {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important; background: transparent !important;
    }
    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px; z-index: 99999; pointer-events: none;
    }
    #dbg {
      position: fixed; top: 44px; left: 12px;
      background: rgba(0,0,0,0.75); color: #0f0;
      font-family: monospace; font-size: 11px;
      padding: 6px 8px; border-radius: 6px;
      z-index: 99999; pointer-events: none;
      max-width: 260px; line-height: 1.6;
    }
    #tap-start {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99998; color: #fff;
      font-family: -apple-system, sans-serif; cursor: pointer;
    }
    #tap-start .big { font-size: 52px; margin-bottom: 16px; }
    #tap-start h2   { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #tap-start p    { font-size: 14px; opacity: 0.6; }
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff; font-family: -apple-system, sans-serif;
    }
    .spinner { width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15); border-top-color: #ff7755;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 18px; }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #progress-bar {
      width: 200px; height: 4px; background: rgba(255,255,255,0.2);
      border-radius: 2px; margin-top: 12px; overflow: hidden;
    }
    #progress-fill { height: 100%; background: #ff7755; border-radius: 2px; width: 0%; }
    #scan-hint {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff; padding: 12px 24px;
      border-radius: 99px; font-family: -apple-system, sans-serif;
      font-size: 15px; pointer-events: none; z-index: 9998; display: none;
    }
    #toggle-btn {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: rgba(255,119,85,0.92); color: #fff; border: none;
      border-radius: 99px; padding: 14px 40px; font-size: 16px; font-weight: 700;
      font-family: -apple-system, sans-serif; cursor: pointer; z-index: 9998; display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
    }
  </style>
</head>
<body>

  <div id="version-badge">v1.5</div>
  <div id="dbg">waiting...</div>

  <div id="tap-start">
    <div class="big">👆</div>
    <h2>Tap to Start AR</h2>
    <p>Aim at the mural artwork</p>
  </div>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Loading frames...</p>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <div id="scan-hint">📷 Aim at the mural artwork</div>
  <button id="toggle-btn">Pause</button>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true; sortObjects: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false">
    </a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity id="seq-plane"></a-entity>
    </a-entity>
    <a-light type="ambient" color="#fff" intensity="1"></a-light>
  </a-scene>

  <script>
    var CFG = {
      folder:     'assets/pngseq',
      prefix:     '[cityleaf]',
      digits:     3,
      ext:        '.png',
      startFrame: 1,
      endFrame:   20,        // exactly 20 frames
      fps:        12,
      planeW:     1.0,
      planeH:     1.0,
    };

    var dbg          = document.getElementById('dbg');
    var loadingEl    = document.getElementById('loading-overlay');
    var loadingText  = document.getElementById('loading-text');
    var progressFill = document.getElementById('progress-fill');
    var scanHint     = document.getElementById('scan-hint');
    var toggleBtn    = document.getElementById('toggle-btn');
    var scene        = document.querySelector('a-scene');

    var textures     = [];
    var mesh         = null;
    var currentFrame = 0;
    var isPlaying    = false;
    var lastTime     = 0;
    var frameDur     = 1000 / CFG.fps;

    var logLines = [];
    function log(msg) {
      logLines.unshift(msg);
      if (logLines.length > 6) logLines.pop();
      dbg.innerHTML = logLines.join('<br>');
    }

    function framePath(i) {
      var n = String(i);
      while (n.length < CFG.digits) n = '0' + n;
      return CFG.folder + '/' + CFG.prefix + n + CFG.ext;
    }

    function preloadFrames(onDone) {
      var loader = new THREE.TextureLoader();
      var total  = CFG.endFrame - CFG.startFrame + 1;
      var done   = 0;
      textures   = new Array(total);
      log('loading ' + total + ' frames...');

      for (var i = CFG.startFrame; i <= CFG.endFrame; i++) {
        (function(fi, ai) {
          loader.load(framePath(fi),
            function(tex) {
              tex.minFilter = THREE.LinearFilter;
              tex.magFilter = THREE.LinearFilter;
              // IMPORTANT: do NOT use sRGB encoding — keep linear so alpha works
              tex.encoding = THREE.LinearEncoding;
              textures[ai] = tex;
              done++;
              progressFill.style.width = Math.round(done/total*100) + '%';
              loadingText.textContent  = 'Loading... ' + done + '/' + total;
              if (done === total) { log('all ' + total + ' loaded!'); onDone(); }
            },
            undefined,
            function() {
              done++;
              if (done === total) { log('done (' + done + ')'); onDone(); }
            }
          );
        })(i, i - CFG.startFrame);
      }
    }

    function buildMesh() {
      var firstTex = null;
      for (var i = 0; i < textures.length; i++) {
        if (textures[i]) { firstTex = textures[i]; break; }
      }
      if (!firstTex) { log('ERROR: no textures'); return; }

      var geo = new THREE.PlaneGeometry(CFG.planeW, CFG.planeH);

      // KEY FIX: use MeshStandardMaterial with emissiveMap so it's
      // unaffected by renderer alpha compositing issues
      var mat = new THREE.MeshStandardMaterial({
        map:              firstTex,
        emissiveMap:      firstTex,
        emissive:         new THREE.Color(1, 1, 1),
        emissiveIntensity: 1.0,
        transparent:      true,
        alphaTest:        0.05,
        side:             THREE.DoubleSide,
        depthWrite:       false,
        metalness:        0,
        roughness:        1,
      });

      mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(0, 0, 0.001); // tiny z offset to avoid z-fighting
      mesh.renderOrder = 999;
      mesh.visible = false;

      var planeEl = document.getElementById('seq-plane');
      planeEl.object3D.add(mesh);
      log('mesh built OK');
    }

    function animLoop(now) {
      requestAnimationFrame(animLoop);
      if (!isPlaying || !mesh || !textures.length) return;
      if (now - lastTime < frameDur) return;
      lastTime = now;
      currentFrame = (currentFrame + 1) % textures.length;
      var tex = textures[currentFrame];
      if (tex) {
        mesh.material.map          = tex;
        mesh.material.emissiveMap  = tex;
        mesh.material.needsUpdate  = true;
      }
    }
    requestAnimationFrame(animLoop);

    document.getElementById('tap-start').addEventListener('click', function () {
      document.getElementById('tap-start').style.display = 'none';
      loadingEl.style.display = 'flex';
      log('loading frames...');

      preloadFrames(function() {
        if (scene.hasLoaded) { buildMesh(); startAR(); }
        else { scene.addEventListener('loaded', function() { buildMesh(); startAR(); }, { once: true }); }
      });
    });

    function startAR() {
      var sys = scene.systems['mindar-image-system'];
      if (sys) { sys.start(); log('AR started'); }
      else { log('ERROR: no mindar sys'); }
    }

    scene.addEventListener('loaded', function () {
      log('scene loaded');
      var sys = scene.systems['mindar-image-system'];
      if (sys) {
        sys.el.addEventListener('arReady', function () {
          log('arReady ✓');
          loadingEl.style.display = 'none';
          scanHint.style.display  = 'block';
        });
      }
      setTimeout(function() {
        loadingEl.style.display = 'none';
        scanHint.style.display  = 'block';
      }, 15000);

      var target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', function () {
        log('TARGET FOUND ✓');
        if (!mesh) { log('mesh null!'); return; }
        mesh.visible = true;
        isPlaying    = true;
        lastTime     = performance.now();
        scanHint.style.display  = 'none';
        toggleBtn.style.display = 'block';
      });
      target.addEventListener('targetLost', function () {
        log('target lost');
        if (mesh) mesh.visible = false;
        isPlaying = false;
        scanHint.style.display  = 'block';
        toggleBtn.style.display = 'none';
      });
    });

    toggleBtn.addEventListener('click', function () {
      isPlaying = !isPlaying;
      toggleBtn.textContent = isPlaying ? 'Pause' : 'Play';
      if (isPlaying) lastTime = performance.now();
    });
  </script>

</body>
</html>
