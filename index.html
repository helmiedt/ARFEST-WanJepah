<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest Wanjepah AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    a-scene {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video:not([id]) {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important; z-index: 0 !important;
      display: block !important; visibility: visible !important; opacity: 1 !important;
    }
    canvas {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important; background: transparent !important;
    }
    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px; z-index: 99999; pointer-events: none;
    }
    #tap-start {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99998; color: #fff;
      font-family: -apple-system, sans-serif; cursor: pointer;
    }
    #tap-start .big { font-size: 52px; margin-bottom: 16px; }
    #tap-start h2   { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #tap-start p    { font-size: 14px; opacity: 0.6; }
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff; font-family: -apple-system, sans-serif;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff7755; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #scan-hint {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff;
      padding: 12px 24px; border-radius: 99px;
      font-family: -apple-system, sans-serif; font-size: 15px;
      pointer-events: none; z-index: 9998; display: none;
    }
    #toggle-btn {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,119,85,0.92); color: #fff; border: none;
      border-radius: 99px; padding: 14px 40px;
      font-size: 16px; font-weight: 700; font-family: -apple-system, sans-serif;
      cursor: pointer; z-index: 9998; display: none;
      box-shadow: 0 4px 20px rgba(255,119,85,0.4);
    }
  </style>
</head>
<body>

  <div id="version-badge">v1.1</div>

  <div id="tap-start">
    <div class="big">👆</div>
    <h2>Tap to Start AR</h2>
    <p>Aim at the mural artwork</p>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Starting AR...</p>
  </div>

  <div id="scan-hint">📷 Aim at the mural artwork</div>
  <button id="toggle-btn">Toggle Video</button>

  <!-- Hidden source videos — played via user tap to unlock mobile autoplay -->
  <video id="vid1" src="assets/Jepah_1.mp4" muted playsinline loop crossorigin="anonymous"
    style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;"></video>
  <video id="vid2" src="assets/Jepah_2.mp4" muted playsinline loop crossorigin="anonymous"
    style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false">
    </a-camera>

    <!-- Target: canvas-texture plane -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity id="vid-plane"
        geometry="primitive: plane; width: 1; height: 1;"
        position="0 0 0"
        canvas-video-mat
      ></a-entity>
    </a-entity>

    <a-light type="ambient" color="#fff" intensity="1"></a-light>
  </a-scene>

  <script>
    /*
      canvas-video-mat component:
      - Creates a 2D canvas, draws video frames onto it every tick
      - Uses that canvas as a THREE.CanvasTexture (NOT VideoTexture)
      - CanvasTexture works reliably on mobile where VideoTexture fails
      - Reads which video to show from window.activeVidEl
    */
    AFRAME.registerComponent('canvas-video-mat', {
      init: function () {
        // Create offscreen canvas
        this.cvs = document.createElement('canvas');
        this.cvs.width  = 512;
        this.cvs.height = 512;
        this.ctx = this.cvs.getContext('2d');

        // Fill black initially
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, 512, 512);

        // THREE.CanvasTexture — reads from canvas pixels, always works on mobile
        this.texture = new THREE.CanvasTexture(this.cvs);
        this.texture.minFilter = THREE.LinearFilter;
        this.texture.magFilter = THREE.LinearFilter;

        // Apply to mesh
        var self = this;
        var applyMat = function () {
          var mesh = self.el.getObject3D('mesh');
          if (!mesh) return;
          mesh.material = new THREE.MeshBasicMaterial({
            map: self.texture,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
          mesh.material.needsUpdate = true;
        };

        this.el.addEventListener('object3dset', applyMat);
        setTimeout(applyMat, 100);
      },

      tick: function () {
        // Draw current video frame onto canvas every tick
        var vid = window.activeVidEl;
        if (!vid || vid.readyState < 2) return; // HAVE_CURRENT_DATA
        try {
          this.ctx.drawImage(vid, 0, 0, 512, 512);
          this.texture.needsUpdate = true;
        } catch(e) {}
      }
    });

    // ─────────────────────────────────────────────────────────────────────
    var tapScreen  = document.getElementById('tap-start');
    var loadingEl  = document.getElementById('loading-overlay');
    var scanHint   = document.getElementById('scan-hint');
    var toggleBtn  = document.getElementById('toggle-btn');
    var scene      = document.querySelector('a-scene');
    var vid1El     = document.getElementById('vid1');
    var vid2El     = document.getElementById('vid2');

    // Active video that canvas-video-mat reads from
    window.activeVidEl = vid1El;
    var showingVid1 = true;

    // ── Tap to start ──────────────────────────────────────────────────────
    tapScreen.addEventListener('click', function () {
      tapScreen.style.display = 'none';
      loadingEl.style.display = 'flex';

      // Unlock videos on user gesture
      vid1El.play().catch(function(){});
      vid2El.play().catch(function(){});

      if (scene.hasLoaded) {
        startMindAR();
      } else {
        scene.addEventListener('loaded', startMindAR, { once: true });
      }
    });

    function startMindAR() {
      var sys = scene.systems['mindar-image-system'];
      if (sys) { sys.start(); }
    }

    // ── AR ready ──────────────────────────────────────────────────────────
    scene.addEventListener('loaded', function () {
      var sys = scene.systems['mindar-image-system'];
      if (sys) {
        sys.el.addEventListener('arReady', function () {
          loadingEl.style.opacity = '0';
          setTimeout(function () { loadingEl.style.display = 'none'; }, 700);
          scanHint.style.display = 'block';
        });
      }
      setTimeout(function () {
        loadingEl.style.display = 'none';
        scanHint.style.display = 'block';
      }, 12000);
    });

    // ── Target found / lost ───────────────────────────────────────────────
    scene.addEventListener('loaded', function () {
      var target = document.querySelector('[mindar-image-target]');
      if (!target) return;

      target.addEventListener('targetFound', function () {
        scanHint.style.display = 'none';
        toggleBtn.style.display = 'block';
        // Make sure active video is playing
        window.activeVidEl.play().catch(function(){});
      });

      target.addEventListener('targetLost', function () {
        scanHint.style.display = 'block';
        toggleBtn.style.display = 'none';
      });
    });

    // ── Toggle ────────────────────────────────────────────────────────────
    toggleBtn.addEventListener('click', function () {
      showingVid1 = !showingVid1;
      window.activeVidEl = showingVid1 ? vid1El : vid2El;
      window.activeVidEl.play().catch(function(){});
    });
  </script>

</body>
</html>
