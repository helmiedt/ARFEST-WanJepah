<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest AR - Anchor Test</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    a-scene {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video:not([id]) {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important; z-index: 0 !important;
      display: block !important; visibility: visible !important; opacity: 1 !important;
    }
    canvas {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important; background: transparent !important;
    }
    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px; z-index: 99999; pointer-events: none;
    }
    #dbg {
      position: fixed; top: 44px; left: 12px;
      background: rgba(0,0,0,0.75); color: #0f0;
      font-family: monospace; font-size: 11px;
      padding: 6px 8px; border-radius: 6px;
      z-index: 99999; pointer-events: none;
      max-width: 260px; line-height: 1.6;
    }
    #tap-start {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99998; color: #fff;
      font-family: -apple-system, sans-serif; cursor: pointer;
    }
    #tap-start .big { font-size: 52px; margin-bottom: 16px; }
    #tap-start h2   { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #tap-start p    { font-size: 14px; opacity: 0.6; }
    #scan-hint {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff; padding: 12px 24px;
      border-radius: 99px; font-family: -apple-system, sans-serif;
      font-size: 15px; pointer-events: none; z-index: 9998; display: none;
    }
  </style>
</head>
<body>

  <div id="version-badge">v1.6-anchortest</div>
  <div id="dbg">waiting tap...</div>

  <div id="tap-start">
    <div class="big">👆</div>
    <h2>Tap to Start AR</h2>
    <p>Aim at the mural</p>
  </div>

  <div id="scan-hint">📷 Aim at the mural artwork</div>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- RED CUBE — solid, no texture, should ALWAYS be visible if anchor works -->
      <a-box
        color="#ff0000"
        position="0 0 0.1"
        scale="0.2 0.2 0.2"
        material="color: #ff0000; shader: flat;"
      ></a-box>

      <!-- GREEN FLAT PLANE — no texture, just solid color -->
      <a-plane
        color="#00ff00"
        position="0 0 0"
        width="0.8" height="0.8"
        material="color: #00ff00; shader: flat; side: double;"
      ></a-plane>

      <!-- BLUE small cube offset to confirm orientation -->
      <a-box
        color="#0000ff"
        position="0.3 0.3 0.1"
        scale="0.1 0.1 0.1"
        material="color: #0000ff; shader: flat;"
      ></a-box>

    </a-entity>

    <a-light type="ambient" color="#fff" intensity="1"></a-light>
  </a-scene>

  <script>
    var dbg   = document.getElementById('dbg');
    var scene = document.querySelector('a-scene');
    var logLines = [];
    function log(msg) {
      logLines.unshift(msg);
      if (logLines.length > 6) logLines.pop();
      dbg.innerHTML = logLines.join('<br>');
    }

    document.getElementById('tap-start').addEventListener('click', function () {
      document.getElementById('tap-start').style.display = 'none';
      document.getElementById('scan-hint').style.display = 'block';
      log('tapped - starting AR');

      if (scene.hasLoaded) {
        startAR();
      } else {
        scene.addEventListener('loaded', startAR, { once: true });
      }
    });

    function startAR() {
      log('scene loaded');
      var sys = scene.systems['mindar-image-system'];
      if (sys) {
        sys.start();
        log('AR started');
        sys.el.addEventListener('arReady', function() { log('arReady ✓'); });
      } else {
        log('ERROR: no mindar sys!');
      }

      var target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', function () { log('TARGET FOUND ✓'); });
      target.addEventListener('targetLost',  function () { log('target lost'); });
    }
  </script>

</body>
</html>
