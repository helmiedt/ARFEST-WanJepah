<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Arfest WanJepah AR</title>

  <!-- EXACT same versions as working AtarImage project -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #mindar-ar-container,
    #mindar-ar-container > div {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      z-index: 0 !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important;
      background: transparent !important;
    }
    a-scene {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important;
    }
    #version-badge {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,119,85,0.9); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 5px 10px; border-radius: 6px; z-index: 99999; pointer-events: none;
    }
    #dbg {
      position: fixed; top: 44px; left: 12px;
      background: rgba(0,0,0,0.75); color: #0f0;
      font-family: monospace; font-size: 11px;
      padding: 6px 8px; border-radius: 6px;
      z-index: 99999; pointer-events: none;
      max-width: 260px; line-height: 1.6;
    }
    #loading-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif;
      transition: opacity 0.6s;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff7755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #scan-hint {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff; padding: 12px 24px;
      border-radius: 99px;
      font-family: -apple-system, sans-serif;
      font-size: 15px; pointer-events: none;
      z-index: 9998; display: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="version-badge">v1.8-cubetest</div>
  <div id="dbg">starting...</div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Starting AR...</p>
  </div>
  <div id="scan-hint">📷 Aim at the mural artwork</div>

  <!-- EXACT same a-scene attributes as working AtarImage -->
  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Same as working AtarImage blue box — just colored differently -->
      <!-- RED: center of marker, spinning -->
      <a-box
        position="0 0 0"
        scale="0.3 0.3 0.3"
        color="#ff0000"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 2000; easing: linear">
      </a-box>

      <!-- YELLOW: offset right -->
      <a-box
        position="0.4 0 0"
        scale="0.15 0.15 0.15"
        color="#ffff00">
      </a-box>

      <!-- GREEN: offset up -->
      <a-box
        position="0 0.4 0"
        scale="0.15 0.15 0.15"
        color="#00ff00">
      </a-box>

      <!-- BLUE: floating above -->
      <a-box
        position="0 0 0.2"
        scale="0.15 0.15 0.15"
        color="#0088ff">
      </a-box>

    </a-entity>

    <a-light type="ambient"     color="#fff" intensity="1.5"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1"></a-light>
  </a-scene>

  <script>
    var overlay  = document.getElementById('loading-overlay');
    var scanHint = document.getElementById('scan-hint');
    var dbg      = document.getElementById('dbg');
    var scene    = document.querySelector('a-scene');
    var logLines = [];

    function log(msg) {
      logLines.unshift(msg);
      if (logLines.length > 6) logLines.pop();
      dbg.innerHTML = logLines.join('<br>');
    }

    function hideOverlay() {
      overlay.style.opacity = '0';
      setTimeout(function() { overlay.style.display = 'none'; }, 700);
      scanHint.style.display = 'block';
    }

    scene.addEventListener('loaded', function () {
      log('scene loaded');
      var sys = scene.systems['mindar-image-system'];
      if (sys) {
        sys.el.addEventListener('arReady', function() {
          log('arReady ✓');
          var videos = document.querySelectorAll('video');
          videos.forEach(function(v) {
            v.style.display     = 'block';
            v.style.visibility  = 'visible';
            v.style.opacity     = '1';
            v.style.zIndex      = '0';
          });
          hideOverlay();
        });
      }
      setTimeout(hideOverlay, 8000);
    });

    document.querySelectorAll('[mindar-image-target]').forEach(function(t) {
      t.addEventListener('targetFound', function() {
        log('TARGET FOUND ✓');
        scanHint.style.display = 'none';
      });
      t.addEventListener('targetLost', function() {
        log('target lost');
        scanHint.style.display = 'block';
      });
    });
  </script>

</body>
</html>
